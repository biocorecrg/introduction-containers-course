image: python:3.12

stages:
  - build
  - deploy

variables:
  GROUP_RUNNER_TAG: "nodejs"

sphinx:
  stage: build
  script:
    - apt-get update && apt-get install -y make git
    # Optionally install global requirements if present
    - |
      if [ -f docs/requirements.txt ]; then
        pip install -r docs/requirements.txt || true
      fi
    - mkdir -p site
    # Build docs for each tag
    - |
      tags="$(git tag -l)"
      if [ -z "$tags" ]; then
        echo "No tags found."
      else
        for tag in $tags; do
          cd
          echo "=== Building docs for tag: $tag ==="
          git checkout --force "$tag"
          if [ -f docs/requirements.txt ]; then
            pip install -r docs/requirements.txt
          fi
          if [ -d docs ]; then
            cd docs
            make html
            cd ..
            safe_tag="$(echo "$tag" | sed 's/[^A-Za-z0-9._-]/_/g')"
            rm -rf "site/${safe_tag}"
            cp -r docs/_build/html "site/${safe_tag}"
          else
            echo "No docs directory in tag $tag, skipping."
          fi
        done
      fi
    # Build 'latest' from main or master
    - |
      cd
      echo "=== Building latest (main/master) ==="
      if git show-ref --verify --quiet refs/heads/main; then
        git checkout --force main
      elif git show-ref --verify --quiet refs/heads/master; then
        git checkout --force master
      else
        git checkout --force "$(git rev-parse --abbrev-ref HEAD || git rev-parse HEAD)"
      fi
      if [ -f docs/requirements.txt ]; then
        pip install -r docs/requirements.txt
      fi
      if [ -d docs ]; then
        cd docs
        make html
        cd ..
        rm -rf site/latest
        cp -r docs/_build/html site/latest
      fi
    # Copy redirect index.html if exists
    - |
      if [ -f docs/index.html ]; then
        cp docs/index.html site/index.html
      fi
  artifacts:
    paths:
      - site
  only:
    - main
  tags:
    - $GROUP_RUNNER_TAG

pages:
  stage: deploy
  dependencies:
    - sphinx
  script:
    # - ls -l site/   # Debug: list files to confirm site/ exists
    - rm -rf .public
    - mkdir -p .public
    - cp -r site/* .public
    - rm -rf public
    - mv .public public
  artifacts:
    paths:
      - public
  only:
    - main
  tags:
    - $GROUP_RUNNER_TAG


